name: iOS Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build web app
        run: cd client && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Sync Capacitor
        run: cd client && npx cap sync ios

      - name: Resolve Swift Package dependencies
        run: |
          cd client/ios/App
          xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App

      - name: Build iOS (simulator, unsigned)
        run: |
          cd client/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: TankVergelijker-iOS-Simulator
          path: client/ios/App/build/Build/Products/Release-iphonesimulator/
          retention-days: 14
